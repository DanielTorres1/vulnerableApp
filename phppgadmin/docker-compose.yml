version: '3'

services:
  phppgadmin:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
      - "5432:5432"
    volumes:
      - ./config.inc.php:/var/www/html/phppgadmin/conf/config.inc.php
    depends_on:
      - postgres

  postgres:
    image: postgres:9.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mydatabase
